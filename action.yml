name: 'PairReviewer'
description: 'AI-powered PR reviewer using GitHub Models. Posts inline comments and approves PRs once all feedback is resolved.'
author: 'virulnirmala'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  reviewer-token:
    description: >
      Personal Access Token of the reviewer GitHub account.
      Needs: pull_requests:write, contents:read.
      Store as a repo secret (e.g. REVIEWER_PAT).
    required: true

  github-token:
    description: >
      Token used to read PR data (threads, diff).
      Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}

  models-token:
    description: >
      Token used to call the GitHub Models API.
      Required for org repos where the built-in GITHUB_TOKEN lacks Models access.
      Use a personal PAT (classic, no extra scopes needed) from an account with GitHub Models access.
      Defaults to github-token if not set.
    required: false
    default: ''

  model:
    description: >
      GitHub Models model ID to use for the review.
      See https://github.com/marketplace/models for available models.
    required: false
    default: 'openai/gpt-4.1'

  approve-on-clean:
    description: >
      Set to 'false' to post a COMMENT instead of APPROVE when no issues are found.
      Useful if you want a human final approval.
    required: false
    default: 'true'

  wait-for-other-workflows-before-approve:
    description: >
      When true, APPROVE verdicts wait until other workflow runs for the same commit are completed.
      If timeout is reached, PairReviewer posts COMMENT instead of APPROVE.
    required: false
    default: 'true'

  wait-for-other-workflows-timeout-seconds:
    description: >
      Max seconds to wait for other workflow runs to complete before downgrading APPROVE to COMMENT.
    required: false
    default: '300'

  wait-for-other-workflows-poll-seconds:
    description: >
      Poll interval in seconds when waiting for other workflow runs.
    required: false
    default: '10'

  max-diff-chars:
    description: >
      Maximum characters of diff to send to the model. Diffs exceeding this are truncated.
      Increase for large PRs if your model supports it.
    required: false
    default: '120000'

runs:
  using: 'node20'
  main: 'dist/index.js'
