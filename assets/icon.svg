<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background: deep indigo -->
  <rect width="512" height="512" rx="88" fill="#13111c"/>

  <!-- Back card: steel blue, clearly different from bg -->
  <rect x="72" y="88" width="300" height="240" rx="22" fill="#1e3a5f"/>

  <!-- Code lines on back card -->
  <rect x="102" y="126" width="88"  height="11" rx="5.5" fill="#4da3ff" opacity="0.95"/>
  <rect x="102" y="152" width="152" height="11" rx="5.5" fill="#ffffff" opacity="0.22"/>
  <rect x="102" y="178" width="118" height="11" rx="5.5" fill="#ffffff" opacity="0.22"/>
  <rect x="102" y="204" width="170" height="11" rx="5.5" fill="#ffffff" opacity="0.14"/>
  <rect x="102" y="230" width="96"  height="11" rx="5.5" fill="#ffffff" opacity="0.14"/>
  <rect x="102" y="256" width="136" height="11" rx="5.5" fill="#ffffff" opacity="0.09"/>
  <rect x="102" y="282" width="76"  height="11" rx="5.5" fill="#4da3ff" opacity="0.45"/>

  <!-- Front card: white -->
  <rect x="148" y="192" width="300" height="240" rx="22" fill="#ffffff"/>

  <!-- Approval circle -->
  <circle cx="298" cy="292" r="56" fill="#0d1b2e"/>

  <!-- Checkmark -->
  <polyline points="273,292 290,311 325,272"
            fill="none" stroke="#4da3ff" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle lines on front card -->
  <rect x="176" y="372" width="108" height="10" rx="5" fill="#0d1b2e" opacity="0.10"/>
  <rect x="176" y="390" width="76"  height="10" rx="5" fill="#0d1b2e" opacity="0.06"/>

</svg>
