name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history for release commits
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build dist
        run: npm run build

      - name: Verify dist
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js was not produced by the build"
            exit 1
          fi
          echo "dist/index.js: $(wc -c < dist/index.js) bytes"

      # Commit dist back to the branch so the action can be used directly from source.
      # Only runs on pushes to main (not on PRs).
      - name: Commit dist to repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          if git diff --staged --quiet; then
            echo "No changes to dist — skipping commit"
          else
            git commit -m "chore: rebuild dist [skip ci]"
            git push
          fi

      # On version tags: also update the major version pointer (e.g. v1 → v1.2.3)
      - name: Update major version tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR="${TAG%%.*}"
          git tag -f "${MAJOR}" "${TAG}"
          git push origin "${MAJOR}" --force
        env:
          GITHUB_REF: ${{ github.ref }}
